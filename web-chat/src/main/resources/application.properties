# Use file-based H2 DB (saved under /data directory)
spring.datasource.url=jdbc:h2:file:./data/chatdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT — replace jwt.secret in production (must be >= 32 bytes for HS256). Example PostgreSQL:
# spring.datasource.url=jdbc:postgresql://localhost:5432/chat
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=DevJwtSecretKeyMustBeAtLeast32BytesLongForHS256!!
jwt.expiration-ms=86400000