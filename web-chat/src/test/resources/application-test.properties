# Isolated in-memory DB per test run (does not touch ./data/chatdb)
spring.datasource.url=jdbc:h2:mem:chat_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

jwt.secret=TestJwtSecretKeyMustBeAtLeast32BytesLongForHS256!!
jwt.expiration-ms=86400000
